services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "443:443"
    environment:
      OFFICE_DOMAIN: ${OFFICE_DOMAIN}
      OFFICE_API_DOMAIN: ${OFFICE_API_DOMAIN}
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - onlyoffice
      - office-api

  onlyoffice:
    image: onlyoffice/documentserver:latest
    restart: unless-stopped
    environment:
      JWT_ENABLED: "false"
      JWT_SECRET: ""
    volumes:
      - onlyoffice_data:/var/www/onlyoffice/Data
      - onlyoffice_logs:/var/log/onlyoffice
      - onlyoffice_lib:/var/lib/onlyoffice
      - onlyoffice_db:/var/lib/postgresql

  office-api:
    build:
      context: .
      dockerfile: Dockerfile.office-api
    restart: unless-stopped
    environment:
      PORT: 4000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_FILES_BUCKET: ${SUPABASE_FILES_BUCKET:-sanaya-files}
      CORS_ORIGIN: ${CORS_ORIGIN}

volumes:
  caddy_data:
  caddy_config:
  onlyoffice_data:
  onlyoffice_logs:
  onlyoffice_lib:
  onlyoffice_db:
